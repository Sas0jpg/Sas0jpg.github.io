<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* CRT эффект */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.02) 0px,
        transparent 2px
    );
    pointer-events: none;
}

/* меню */
#box {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(200,200,200,0.6);
    padding: 30px;
    text-align: center;
}

/* ввод */
#password {
    font-family: 'Press Start 2P';
    font-size: 18px;
    background: transparent;
    color: white;
    border: 2px solid rgba(200,200,200,0.8);
    padding: 10px;
    text-align: center;
    width: 200px;
}

/* кнопка */
#enterBtn {
    margin-top: 15px;
    padding: 10px 20px;
    font-family: 'Press Start 2P';
    background: gray;
    color: white;
    border: none;
    cursor: pointer;
}

/* основной */
#main {
    display: none;
    flex-direction: column;
    align-items: center;
}

/* число */
#number {
    font-family: 'Press Start 2P';
    font-size: 100px;
    transform: scaleY(1.3);
}

/* подпись */
#signature {
    margin-top: 20px;
    color: red;
    font-family: 'Press Start 2P';
    font-size: 14px;
}

/* сообщения */
#systemMessage {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: red;
    font-family: 'Press Start 2P';
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
}

/* глитч */
.glitchScreen {
    animation: glitch 0.2s;
}

@keyframes glitch {
    0% { transform: translate(0); }
    50% { transform: translate(-5px,5px); }
    100% { transform: translate(0); }
}
</style>
</head>

<body>

<div id="login">
    <div id="box">
        <input id="password" type="text" placeholder="0000">
        <br>
        <button id="enterBtn">ENTER</button>
    </div>
</div>

<div id="main">
    <div id="number"></div>
    <div id="signature">Jopins strength</div>
</div>

<div id="systemMessage"></div>

<audio id="music" loop>
  <source src="0505.MP3">
</audio>

<audio id="click">
  <source src="metal-button-press_fyhbwd4u.mp3">
</audio>

<script>
const input = document.getElementById("password");
const click = document.getElementById("click");
const music = document.getElementById("music");

const correctPassword = "4321";

/* звук при вводе */
input.addEventListener("input", () => {
    click.volume = 0.2;
    click.currentTime = 0;
    click.play().catch(()=>{});
});

/* генерация числа */
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

const now = new Date();
const seed = now.getFullYear()*10000 + now.getMonth()*1000 + now.getDate()*100 + now.getHours();
const finalNumber = Math.floor(seededRandom(seed) * 101);

const numberEl = document.getElementById("number");

/* анимация числа */
let count = 0;
let interval = setInterval(() => {
    numberEl.textContent = Math.floor(Math.random()*101);
    count++;
    if (count > 20) {
        clearInterval(interval);
        numberEl.textContent = finalNumber;
        applyColor(finalNumber);
    }
}, 50);

/* цвет */
function applyColor(num) {
    const intensity = num / 100;
    const red = 255;
    const green = Math.floor(255 * (1 - intensity));
    const blue = Math.floor(255 * (1 - intensity));
    numberEl.style.color = `rgb(${red},${green},${blue})`;

    music.volume = 0.1 + intensity * 0.5;
}

/* вход */
document.getElementById("enterBtn").onclick = () => {
    if (input.value === correctPassword) {
        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "flex";
        music.play().catch(()=>{});
    } else {
        input.value = "";
    }
};

/* сообщения системы */
const msg = document.getElementById("systemMessage");
const messages = [
    "ERROR 0x29F",
    "SIGNAL LOST",
    "DATA CORRUPTED",
    "SYSTEM FAILURE",
    "YOU ARE OBSERVED"
];

function showMessage(text) {
    msg.textContent = text;
    msg.style.opacity = "1";
    setTimeout(() => msg.style.opacity = "0", 2000);
}

/* случайные глитчи */
setInterval(() => {
    const r = Math.random();

    if (r < 0.3) {
        document.body.classList.add("glitchScreen");
        setTimeout(() => document.body.classList.remove("glitchScreen"), 200);
    } else if (r < 0.6) {
        showMessage(messages[Math.floor(Math.random()*messages.length)]);
    }

}, 4000);
</script>

</body>
</html>
