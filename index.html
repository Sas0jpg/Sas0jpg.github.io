<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Число дня</title>

<!-- Пиксельный шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Лёгкий шум */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: repeating-radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 2px);
    opacity: 0.15;
    pointer-events: none;
}

h1 {
    font-size: 20px;
    margin-bottom: 40px;
    font-family: Arial;
}

#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 80px;
    color: white;
    text-shadow: 0 0 5px rgba(255,255,255,0.4);
}

#signature {
    margin-top: 40px;
    color: red;
    font-size: 20px;
    font-family: Arial;
}
</style>
</head>

<body>

<h1>Число дня</h1>
<div id="number"></div>
<div id="signature">Jopins</div>

<script>
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function getTodaySeed() {
    const today = new Date();
    return today.getFullYear()*1000 + today.getMonth()*100 + today.getDate();
}

const seed = getTodaySeed();
const number = Math.floor(seededRandom(seed) * 100) + 1;

document.getElementById("number").textContent = number;
</script>

</body>
</html>
