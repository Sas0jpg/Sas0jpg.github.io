<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* слабый глитч */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.02) 0px,
        rgba(255,255,255,0.02) 1px,
        transparent 2px,
        transparent 4px
    );
    animation: glitch 0.3s infinite;
}

@keyframes glitch {
    0% { transform: translate(0,0); }
    50% { transform: translate(1px,-1px); }
    100% { transform: translate(-1px,1px); }
}

/* экран входа */
#loginScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

/* серое меню */
#box {
    background: #222;
    border: 2px solid red;
    padding: 40px;
    text-align: center;
    box-shadow: 0 0 15px red;
}

/* поле */
#password {
    font-family: 'Press Start 2P', cursive;
    font-size: 22px;
    background: #111;
    color: white;
    border: 2px solid red;
    padding: 15px;
    text-align: center;
    width: 220px;
    letter-spacing: 5px;
}

/* кнопка */
#enterBtn {
    margin-top: 20px;
    padding: 10px 20px;
    font-family: 'Press Start 2P', cursive;
    background: red;
    color: black;
    border: none;
    cursor: pointer;
}

/* основной */
#main {
    opacity: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 2s ease;
}

/* число */
#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 110px;
    transform: scaleY(1.4);
}

/* подпись */
#signature {
    margin-top: 50px;
    color: red;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="loginScreen">
    <div id="box">
        <input id="password" placeholder="0000" type="password">
        <br>
        <button id="enterBtn">ENTER</button>
    </div>
</div>

<div id="main">
    <div id="number"></div>
    <div id="signature">JOPINS</div>
</div>

<!-- музыка -->
<audio id="music" loop preload="auto">
  <source src="0505.MP3" type="audio/mpeg">
</audio>

<!-- звук кнопок -->
<audio id="clickSound" preload="auto">
  <source src="metal-button-press_fyhbwd4u.mp3" type="audio/mpeg">
</audio>

<script>
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function getTodaySeed() {
    const today = new Date();
    return today.getFullYear()*1000 + today.getMonth()*100 + today.getDate();
}

const number = Math.floor(seededRandom(getTodaySeed()) * 100) + 1;
document.getElementById("number").textContent = number;

const correctPassword = "1234";

// звук при вводе
const input = document.getElementById("password");
const click = document.getElementById("clickSound");

input.addEventListener("input", () => {
    click.currentTime = 0;
    click.play().catch(()=>{});
});

function enterSite() {
    if (input.value === correctPassword) {
        const login = document.getElementById("loginScreen");
        const main = document.getElementById("main");
        const music = document.getElementById("music");

        music.volume = 0.3; // ТИШЕ
        music.play().catch(()=>{});

        login.style.opacity = "0";

        setTimeout(() => {
            login.style.display = "none";
            main.style.opacity = "1";
        }, 800);
    } else {
        alert("Неверный пароль");
    }
}

document.getElementById("enterBtn").onclick = enterSite;

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") enterSite();
});
</script>

</body>
</html>
