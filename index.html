<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* глитч фон */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
    );
    animation: glitch 0.2s infinite;
    pointer-events: none;
}

@keyframes glitch {
    0% { transform: translate(0,0); }
    20% { transform: translate(-1px,1px); }
    40% { transform: translate(1px,-1px); }
    60% { transform: translate(-1px,0); }
    80% { transform: translate(1px,1px); }
    100% { transform: translate(0,0); }
}

/* старт экран */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    transition: opacity 1s ease;
}

/* кнопка кровь */
#startBtn {
    width: 140px;
    height: 140px;
    background: white;
    border: none;
    cursor: pointer;
    position: relative;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

#startBtn::before {
    content: "";
    position: absolute;
    width: 12px;
    height: 30px;
    bottom: -25px;
    left: 30px;
    background: red;
    border-radius: 50%;
    box-shadow:
        20px 10px red,
        50px 5px red,
        80px 15px red;
}

#startBtn::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 40px;
    bottom: -30px;
    background: linear-gradient(to bottom, red, transparent);
    filter: blur(2px);
    opacity: 0.8;
}

/* основной контент */
#main {
    opacity: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 2s ease;
}

/* число */
#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 110px;
    transform: scaleY(1.4);
    letter-spacing: 5px;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

/* подпись */
#signature {
    margin-top: 50px;
    color: red;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    letter-spacing: 3px;
}
</style>
</head>

<body>

<!-- старт экран -->
<div id="startScreen">
    <button id="startBtn"></button>
</div>

<!-- основной сайт -->
<div id="main">
    <div id="number"></div>
    <div id="signature">JOPINS</div>
</div>

<!-- ТВОЙ ЛОКАЛЬНЫЙ ЗВУК -->
<audio id="tick" loop preload="auto">
  <source src="household-clock-tick-tock.mp3" type="audio/mpeg">
</audio>

<script>
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function getTodaySeed() {
    const today = new Date();
    return today.getFullYear()*1000 + today.getMonth()*100 + today.getDate();
}

// число дня
const number = Math.floor(seededRandom(getTodaySeed()) * 100) + 1;
document.getElementById("number").textContent = number;

// кнопка
document.getElementById("startBtn").onclick = () => {
    const start = document.getElementById("startScreen");
    const main = document.getElementById("main");
    const audio = document.getElementById("tick");

    audio.currentTime = 0;
    audio.volume = 1;

    audio.play().catch(() => {
        alert("Нажми ещё раз для звука");
    });

    start.style.opacity = "0";

    setTimeout(() => {
        start.style.display = "none";
        main.style.opacity = "1";
    }, 1000);
};
</script>

</body>
</html>
