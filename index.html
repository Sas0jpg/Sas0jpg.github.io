<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    overflow: hidden;
}

/* шум */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: repeating-radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 2px);
    opacity: 0.12;
}

/* число */
#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 110px;
    transform: scaleY(1.4); /* вытягиваем */
    letter-spacing: 5px;
    text-shadow: 0 0 6px rgba(255,255,255,0.5);
}

/* подпись */
#signature {
    margin-top: 50px;
    color: red;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    letter-spacing: 3px;
}
</style>
</head>

<body>

<div id="number"></div>
<div id="signature">JOPINS</div>

<!-- звук -->
<audio id="tick" loop>
  <source src="https://www.soundjay.com/clock/sounds/clock-ticking-01.mp3" type="audio/mpeg">
</audio>

<script>
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function getTodaySeed() {
    const today = new Date();
    return today.getFullYear()*1000 + today.getMonth()*100 + today.getDate();
}

const seed = getTodaySeed();
const number = Math.floor(seededRandom(seed) * 100) + 1;

document.getElementById("number").textContent = number;

/* включение звука (нужно кликнуть) */
document.body.addEventListener("click", () => {
    document.getElementById("tick").play();
});
</script>

</body>
</html>
