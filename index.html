<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    overflow: hidden;
}

/* глитч В ОТДЕЛЬНОМ СЛОЕ */
#glitch {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 2px,
        transparent 4px
    );
    animation: glitch 0.4s infinite;
    pointer-events: none; /* НЕ блокирует клики */
    z-index: 0;
}

@keyframes glitch {
    0% { transform: translate(0,0); }
    50% { transform: translate(1px,-1px); }
    100% { transform: translate(-1px,1px); }
}

/* центр */
#login {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
}

/* меню */
#box {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(200,200,200,0.7);
    padding: 40px;
    text-align: center;
    transition: opacity 0.5s ease;
}

/* ввод */
#password {
    font-family: 'Press Start 2P', cursive;
    font-size: 18px;
    background: transparent;
    color: white;
    border: 2px solid rgba(200,200,200,0.8);
    padding: 12px;
    text-align: center;
    width: 220px;
    letter-spacing: 6px;
    outline: none;
}

/* кнопка */
#enterBtn {
    margin-top: 20px;
    padding: 10px 20px;
    font-family: 'Press Start 2P', cursive;
    background: rgba(200,200,200,0.2);
    color: white;
    border: 1px solid rgba(200,200,200,0.6);
    cursor: pointer;
}

/* основной */
#main {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    transition: opacity 1.5s ease;
    z-index: 1;
}

/* число */
#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 110px;
    transform: scaleY(1.4);
    color: rgba(255,255,255,0.6);
}

/* подпись */
#signature {
    margin-top: 40px;
    color: red;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="glitch"></div>

<div id="login">
    <div id="box">
        <input id="password" type="text" placeholder="0000">
        <br>
        <button id="enterBtn">ENTER</button>
    </div>
</div>

<div id="main">
    <div id="number"></div>
    <div id="signature">Jopins strength</div>
</div>

<audio id="music" loop>
  <source src="0505.MP3" type="audio/mpeg">
</audio>

<audio id="click">
  <source src="metal-button-press_fyhbwd4u.mp3" type="audio/mpeg">
</audio>

<script>
const input = document.getElementById("password");
const click = document.getElementById("click");
const music = document.getElementById("music");

const correctPassword = "4321";

/* звук при вводе */
input.addEventListener("input", () => {
    click.volume = 0.2;
    click.currentTime = 0;
    click.play().catch(()=>{});
});

/* число */
const today = new Date();
const seed = today.getFullYear()*1000 + today.getMonth()*100 + today.getDate();
const number = Math.floor((Math.sin(seed)*10000 % 1) * 100) + 1;
document.getElementById("number").textContent = number;

/* вход */
document.getElementById("enterBtn").onclick = () => {
    if (input.value === correctPassword) {

        const box = document.getElementById("box");
        const main = document.getElementById("main");

        box.style.opacity = "0";

        setTimeout(() => {
            document.getElementById("login").style.display = "none";
            main.style.opacity = "1";
        }, 500);

        music.volume = 0.3;
        music.play().catch(()=>{});

    } else {
        input.value = "";
    }
};

/* Enter */
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        document.getElementById("enterBtn").click();
    }
});
</script>

</body>
</html>
