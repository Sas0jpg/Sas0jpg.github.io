<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;

    filter:
        contrast(1.1)
        brightness(0.9)
        saturate(0.8);
}

/* CRT полосы */
body::before {
    content: "";
    position: fixed;
    inset: 0;

    background:
        repeating-linear-gradient(
            0deg,
            rgba(255,255,255,0.03) 0px,
            transparent 2px
        );

    pointer-events: none;
    animation: flicker 0.15s infinite;
}

/* шум */
body::after {
    content: "";
    position: fixed;
    inset: 0;

    background-image:
        radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);

    background-size: 4px 4px;

    mix-blend-mode: overlay;
    pointer-events: none;
    opacity: 0.15;
}

/* мерцание */
@keyframes flicker {
    0% { opacity: 0.95; }
    50% { opacity: 1; }
    100% { opacity: 0.92; }
}

/* дыхание экрана */
@keyframes breathe {
    0%,100% {
        transform:
            perspective(900px)
            scale(1.02);
    }

    50% {
        transform:
            perspective(900px)
            scale(1.04);
    }
}

/* меню */
#box {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(200,200,200,0.6);
    padding: 30px;
    text-align: center;

    backdrop-filter: blur(5px);
}

/* ввод */
#password {
    font-family: 'Press Start 2P';
    font-size: 18px;

    background: transparent;
    color: white;

    border: 2px solid rgba(200,200,200,0.8);

    padding: 10px;
    text-align: center;

    width: 200px;
}

/* кнопка */
#enterBtn {
    margin-top: 15px;
    padding: 10px 20px;

    font-family: 'Press Start 2P';

    background: rgba(255,255,255,0.15);
    color: white;

    border: 1px solid rgba(255,255,255,0.3);

    cursor: pointer;
}

/* главный экран */
#main {
    display: none;
    flex-direction: column;
    align-items: center;

    animation: breathe 5s infinite;
}

/* число */
#number {
    font-family: 'Press Start 2P';

    font-size: 100px;

    transform:
        scaleY(1.3)
        perspective(900px);

    text-shadow:
        0 0 10px rgba(255,0,0,0.3),
        0 0 20px rgba(255,255,255,0.15);
}

/* подпись */
#signature {
    margin-top: 20px;

    color: red;

    font-family: 'Press Start 2P';

    font-size: 14px;

    opacity: 0.8;
}
</style>
</head>

<body>

<div id="login">
    <div id="box">

        <input
            id="password"
            type="text"
            placeholder="0000"
        >

        <br>

        <button id="enterBtn">
            ENTER
        </button>

    </div>
</div>

<div id="main">

    <div id="number"></div>

    <div id="signature">
        Jopins strength
    </div>

</div>

<!-- музыка -->
<audio id="music" loop>
    <source src="0505.MP3">
</audio>

<!-- звук кнопок -->
<audio id="click">
    <source src="metal-button-press_fyhbwd4u.mp3">
</audio>

<script>
const input = document.getElementById("password");
const click = document.getElementById("click");
const music = document.getElementById("music");

const correctPassword = "4321";

/* звук ввода */
input.addEventListener("input", () => {

    click.volume = 0.2;

    click.currentTime = 0;

    click.play().catch(()=>{});

});

/* генерация числа */
function seededRandom(seed) {

    let x = Math.sin(seed) * 10000;

    return x - Math.floor(x);
}

/* число меняется каждый час */
const now = new Date();

const seed =
    now.getFullYear()*10000 +
    now.getMonth()*1000 +
    now.getDate()*100 +
    now.getHours();

const finalNumber =
    Math.floor(seededRandom(seed) * 101);

const numberEl =
    document.getElementById("number");

/* анимация перебора */
let count = 0;

let interval = setInterval(() => {

    numberEl.textContent =
        Math.floor(Math.random()*101);

    count++;

    if (count > 20) {

        clearInterval(interval);

        numberEl.textContent =
            finalNumber;

        applyColor(finalNumber);
    }

}, 50);

/* цвет */
function applyColor(num) {

    const intensity = num / 100;

    const red = 255;

    const green =
        Math.floor(255 * (1 - intensity));

    const blue =
        Math.floor(255 * (1 - intensity));

    numberEl.style.color =
        `rgb(${red},${green},${blue})`;

    /* громкость зависит от числа */
    music.volume =
        0.1 + intensity * 0.5;
}

/* вход */
document.getElementById("enterBtn").onclick = () => {

    if (input.value === correctPassword) {

        document.getElementById("login")
            .style.display = "none";

        document.getElementById("main")
            .style.display = "flex";

        music.play().catch(()=>{});

    } else {

        input.value = "";
    }
};

/* Enter */
input.addEventListener("keydown", (e) => {

    if (e.key === "Enter") {

        document.getElementById("enterBtn")
            .click();
    }
});
</script>

</body>
</html>
