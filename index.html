<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* CRT эффект */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03) 0px,
        transparent 2px
    );
    pointer-events: none;
}

/* дыхание */
@keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.01); }
}

#main {
    display: none;
    flex-direction: column;
    align-items: center;
    animation: breathe 4s infinite;
}

/* число */
#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 100px;
    transform: scaleY(1.3);
    transition: 0.3s;
}

/* подпись */
#signature {
    margin-top: 20px;
    color: red;
    font-family: 'Press Start 2P';
    font-size: 14px;
}

/* critical */
.critical {
    animation: pulse 1s infinite;
    text-shadow: 0 0 20px red;
}

@keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

/* glitch */
@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px,2px); }
    40% { transform: translate(2px,-2px); }
    60% { transform: translate(-2px,0); }
    80% { transform: translate(2px,2px); }
    100% { transform: translate(0); }
}

.glitch {
    animation: glitch 0.2s;
}
</style>
</head>

<body>

<div id="login">
    <div id="box">
        <input id="password" type="text" placeholder="0000">
        <br>
        <button id="enterBtn">ENTER</button>
    </div>
</div>

<div id="main">
    <div id="number"></div>
    <div id="signature">Jopins strength</div>
</div>

<audio id="music" loop>
  <source src="0505.MP3">
</audio>

<audio id="click">
  <source src="metal-button-press_fyhbwd4u.mp3">
</audio>

<script>
const input = document.getElementById("password");
const click = document.getElementById("click");
const music = document.getElementById("music");

const correctPassword = "4321";

/* звук при вводе */
input.addEventListener("input", () => {
    click.volume = 0.2;
    click.currentTime = 0;
    click.play().catch(()=>{});
});

/* генерация числа */
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

const now = new Date();
const seed = now.getFullYear()*10000 + now.getMonth()*1000 + now.getDate()*100 + now.getHours();
const targetNumber = Math.floor(seededRandom(seed) * 101);

const numberEl = document.getElementById("number");

/* АНИМАЦИЯ ПЕРЕБОРА */
let current = 0;
let interval = setInterval(() => {
    numberEl.textContent = Math.floor(Math.random()*101);
    current++;

    if (current > 20) {
        clearInterval(interval);
        numberEl.textContent = targetNumber;

        applyEffects(targetNumber);
    }
}, 50);

/* эффекты */
function applyEffects(num) {

    const intensity = num / 100;
    const red = 255;
    const green = Math.floor(255 * (1 - intensity));
    const blue = Math.floor(255 * (1 - intensity));

    numberEl.style.color = `rgb(${red}, ${green}, ${blue})`;

    // critical режим
    if (num >= 80) {
        numberEl.classList.add("critical");
    }

    // громкость
    music.volume = 0.1 + (num / 100) * 0.5;
}

/* вход */
document.getElementById("enterBtn").onclick = () => {
    if (input.value === correctPassword) {

        document.getElementById("login").style.display = "none";
        const main = document.getElementById("main");
        main.style.display = "flex";

        // glitch вспышка
        main.classList.add("glitch");
        setTimeout(() => main.classList.remove("glitch"), 200);

        music.play().catch(()=>{});
    } else {
        input.value = "";
    }
};

/* Enter */
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        document.getElementById("enterBtn").click();
    }
});
</script>

</body>
</html>
