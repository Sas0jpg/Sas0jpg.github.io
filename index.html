<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* фон (не мешает кликам) */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.01) 0px,
        rgba(255,255,255,0.01) 1px,
        transparent 2px,
        transparent 4px
    );
    pointer-events: none;
}

/* меню */
#box {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(200,200,200,0.5);
    padding: 30px;
    text-align: center;
}

/* ввод */
#password {
    font-family: 'Press Start 2P', cursive;
    font-size: 18px;
    background: transparent;
    color: white;
    border: 2px solid rgba(200,200,200,0.7);
    padding: 10px;
    text-align: center;
    width: 200px;
    letter-spacing: 5px;
}

/* кнопка */
#enterBtn {
    margin-top: 15px;
    padding: 10px 20px;
    font-family: 'Press Start 2P', cursive;
    background: gray;
    color: white;
    border: none;
    cursor: pointer;
}

/* основной */
#main {
    display: none;
    flex-direction: column;
    align-items: center;
}

/* число */
#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 90px;
    transform: scaleY(1.3);
}
</style>
</head>

<body>

<div id="login">
    <div id="box">
        <input id="password" type="text" placeholder="0000">
        <br>
        <button id="enterBtn">ENTER</button>
    </div>
</div>

<div id="main">
    <div id="number"></div>
    <div style="margin-top:20px; color:red; font-family:'Press Start 2P'; font-size:14px;">
        Jopins strength
    </div>
</div>

<audio id="music" loop>
  <source src="0505.MP3" type="audio/mpeg">
</audio>

<audio id="click">
  <source src="metal-button-press_fyhbwd4u.mp3" type="audio/mpeg">
</audio>

<script>
const input = document.getElementById("password");
const click = document.getElementById("click");
const music = document.getElementById("music");

const correctPassword = "4321";

/* звук при вводе */
input.addEventListener("input", () => {
    click.volume = 0.2;
    click.currentTime = 0;
    click.play().catch(()=>{});
});

/* число */
const today = new Date();
const seed = today.getFullYear()*1000 + today.getMonth()*100 + today.getDate();
const number = Math.floor((Math.sin(seed)*10000 % 1) * 100) + 1;
document.getElementById("number").textContent = number;

/* вход */
document.getElementById("enterBtn").onclick = () => {
    if (input.value === correctPassword) {
        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "flex";

        music.volume = 0.3;
        music.play().catch(()=>{});
    } else {
        input.value = "";
    }
};

/* Enter */
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        document.getElementById("enterBtn").click();
    }
});
</script>

</body>
</html>
