<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* глитч фон */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
    );
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { transform: translate(0,0); }
    50% { transform: translate(1px,-1px); }
    100% { transform: translate(-1px,1px); }
}

/* экран входа */
#loginScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

/* контейнер */
#box {
    border: 2px solid red;
    padding: 40px;
    text-align: center;
    box-shadow: 0 0 20px red;
}

/* поле ввода */
#password {
    font-family: 'Press Start 2P', cursive;
    font-size: 20px;
    background: black;
    color: white;
    border: 2px solid red;
    padding: 15px;
    text-align: center;
    outline: none;
    width: 200px;
}

/* кнопка */
#enterBtn {
    margin-top: 20px;
    padding: 10px 20px;
    font-family: 'Press Start 2P', cursive;
    background: red;
    color: black;
    border: none;
    cursor: pointer;
}

/* основной контент */
#main {
    opacity: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 2s ease;
}

/* число */
#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 110px;
    transform: scaleY(1.4);
}

/* подпись */
#signature {
    margin-top: 50px;
    color: red;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- ввод пароля -->
<div id="loginScreen">
    <div id="box">
        <input id="password" placeholder="****" type="password">
        <br>
        <button id="enterBtn">ENTER</button>
    </div>
</div>

<!-- сайт -->
<div id="main">
    <div id="number"></div>
    <div id="signature">JOPINS</div>
</div>

<!-- звук -->
<audio id="music" loop preload="auto">
  <source src="0505.MP3" type="audio/mpeg">
</audio>

<script>
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function getTodaySeed() {
    const today = new Date();
    return today.getFullYear()*1000 + today.getMonth()*100 + today.getDate();
}

const number = Math.floor(seededRandom(getTodaySeed()) * 100) + 1;
document.getElementById("number").textContent = number;

// пароль
const correctPassword = "1234";

function enterSite() {
    const input = document.getElementById("password").value;

    if (input === correctPassword) {
        const login = document.getElementById("loginScreen");
        const main = document.getElementById("main");
        const audio = document.getElementById("music");

        audio.currentTime = 0;
        audio.play().catch(() => {});

        login.style.opacity = "0";

        setTimeout(() => {
            login.style.display = "none";
            main.style.opacity = "1";
        }, 800);
    } else {
        alert("Неверный пароль");
    }
}

document.getElementById("enterBtn").onclick = enterSite;

// enter с клавиатуры
document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        enterSite();
    }
});
</script>

</body>
</html>
