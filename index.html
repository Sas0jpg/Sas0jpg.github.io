<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Jopins</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* старт экран */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    transition: opacity 1s ease;
}

/* кнопка */
#startBtn {
    background: white;
    color: black;
    padding: 20px 50px;
    font-size: 22px;
    border: none;
    cursor: pointer;
}

/* основной контент */
#main {
    opacity: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 2s ease;
}

/* число */
#number {
    font-family: 'Press Start 2P', cursive;
    font-size: 110px;
    transform: scaleY(1.4);
    letter-spacing: 5px;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

/* подпись */
#signature {
    margin-top: 50px;
    color: red;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    letter-spacing: 3px;
}
</style>
</head>

<body>

<!-- старт -->
<div id="startScreen">
    <button id="startBtn">ENTER</button>
</div>

<!-- основной сайт -->
<div id="main">
    <div id="number"></div>
    <div id="signature">JOPINS</div>
</div>

<!-- звук -->
<audio id="tick" loop preload="auto">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-clock-ticking-1057.mp3" type="audio/mpeg">
</audio>

<script>
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function getTodaySeed() {
    const today = new Date();
    return today.getFullYear()*1000 + today.getMonth()*100 + today.getDate();
}

// число дня
const number = Math.floor(seededRandom(getTodaySeed()) * 100) + 1;
document.getElementById("number").textContent = number;

// кнопка запуска
document.getElementById("startBtn").onclick = () => {
    const start = document.getElementById("startScreen");
    const main = document.getElementById("main");
    const audio = document.getElementById("tick");

    // звук
    audio.volume = 1;
    audio.play().catch(() => {});

    // затемнение
    start.style.opacity = "0";

    setTimeout(() => {
        start.style.display = "none";
        main.style.opacity = "1";
    }, 1000);
};
</script>

</body>
</html>
